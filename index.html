<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whisper // local studio</title>
    <link rel="stylesheet" href="style.css?v=14">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1 class="main-title">whisper.local</h1>
        <p class="description">private browser-based speech-to-text</p>

        <div class="glass-card">
            <button id="theme-toggle" class="theme-toggle-btn" title="toggle theme">
                <i class="fas fa-circle-half-stroke"></i>
            </button>
            <!-- drop zone -->
            <div id="drop-zone" class="drop-zone">
                <i class="fas fa-wave-square"></i>
                <p id="file-info">drag & drop audio file here or click to browse</p>
                <input type="file" id="audio-input" accept="audio/*" style="display: none;" multiple>
            </div>

            <!-- controls -->
            <div class="controls-row">
                <div class="control-group">
                    <label>language</label>
                    <div class="custom-select-container" id="lang-custom-select">
                        <div class="custom-select-trigger">
                            <span class="custom-select-text">english</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="custom-select-options">
                            <div class="custom-select-option" data-value="english">english</div>
                            <div class="custom-select-option" data-value="russian">russian</div>
                            <div class="custom-select-option" data-value="spanish">spanish</div>
                            <div class="custom-select-option" data-value="french">french</div>
                            <div class="custom-select-option" data-value="german">german</div>
                            <div class="custom-select-option" data-value="chinese">chinese</div>
                            <div class="custom-select-option" data-value="japanese">japanese</div>
                            <div class="custom-select-option" data-value="korean">korean</div>
                            <div class="custom-select-option" data-value="portuguese">portuguese</div>
                            <div class="custom-select-option" data-value="italian">italian</div>
                            <div class="custom-select-option" data-value="auto">auto detect</div>
                        </div>
                    </div>
                </div>
                <div class="control-group">
                    <label>model quality</label>
                    <div class="custom-select-container" id="model-custom-select">
                        <div class="custom-select-trigger">
                            <span class="custom-select-text"><span class="model-badge" style="background: #5fff87"></span>base (~75mb)</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                        <div class="custom-select-options">
                            <div class="custom-select-option" data-value="Xenova/whisper-tiny" data-color="#5fa8ff"><span class="model-badge" style="background: #5fa8ff"></span>tiny (~40mb)</div>
                            <div class="custom-select-option selected" data-value="Xenova/whisper-base" data-color="#5fff87"><span class="model-badge" style="background: #5fff87"></span>base (~75mb)</div>
                            <div class="custom-select-option" data-value="Xenova/whisper-small" data-color="#ffdd5f"><span class="model-badge" style="background: #ffdd5f"></span>small (~250mb)</div>
                            <div class="custom-select-option" data-value="Xenova/whisper-medium" data-color="#ff5f5f"><span class="model-badge" style="background: #ff5f5f"></span>medium (~750mb)</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-buttons-wrapper">
                <div class="action-buttons">
                    <button id="record-btn" class="btn-secondary">
                        <i class="fas fa-microphone-lines"></i> <span class="btn-text">record voice</span>
                    </button>
                    <button id="process-btn" class="btn-primary">
                        <i class="fas fa-brain"></i> <span class="btn-text">load model</span>
                    </button>
                </div>
                
                <div class="options-row" style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                    <label class="toggle-checkbox">
                        <input type="checkbox" id="auto-transcribe-cb" checked>
                        <span class="checkmark"></span>
                        <span class="toggle-label">auto-transcribe</span>
                    </label>
                    <label class="toggle-checkbox">
                        <input type="checkbox" id="voice-commands-cb" checked>
                        <span class="checkmark"></span>
                        <span class="toggle-label">voice commands</span>
                    </label>
                </div>
            </div>

            <!-- audio visualizer -->
            <div id="visualizer-container" style="width: 100%; height: 60px; background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; margin-top: 1rem; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;">
                <canvas id="visualizer-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></canvas>
                <span id="visualizer-placeholder" style="position: absolute; top: 12px; left: 12px; pointer-events: none; z-index: 10; display: flex; align-items: center;"><span class="pulse-dot"></span></span>
            </div>

            <!-- status -->
            <div class="status-container">
                <div id="status-text" class="status-text">
                    <i class="fas fa-info-circle"></i> ready
                </div>
                <div id="progress-bar-bg" class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <!-- sessions -->
            <div id="sessions-container" class="sessions-container">
                <!-- session cards are added here -->
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=14"></script>
</body>
</html>
