<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whisper // local studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1 class="main-title">whisper.local</h1>
        <p class="description">private browser-based speech-to-text</p>

        <div class="glass-card">
            <!-- Drop Zone -->
            <div id="drop-zone" class="drop-zone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p id="file-info">drag & drop audio file here or click to browse</p>
                <input type="file" id="audio-input" accept="audio/*" style="display: none;">
            </div>

            <!-- Controls -->
            <div class="controls-row">
                <div class="control-group">
                    <label>language</label>
                    <div class="select-wrapper">
                        <select id="language-select">
                            <option value="english">english</option>
                            <option value="russian">russian</option>
                            <option value="spanish">spanish</option>
                            <option value="french">french</option>
                            <option value="german">german</option>
                            <option value="chinese">chinese</option>
                            <option value="japanese">japanese</option>
                            <option value="korean">korean</option>
                            <option value="portuguese">portuguese</option>
                            <option value="italian">italian</option>
                            <option value="auto">auto detect</option>
                        </select>
                    </div>
                </div>
                <div class="control-group">
                    <label>model quality</label>
                    <div class="select-wrapper" id="model-select-wrapper">
                        <select id="model-select">
                            <option value="Xenova/whisper-tiny" data-color="#5fa8ff">tiny (~40mb)</option>
                            <option value="Xenova/whisper-base" selected data-color="#5fff87">base (~75mb)</option>
                            <option value="Xenova/whisper-small" data-color="#ffdd5f">small (~250mb)</option>
                            <option value="Xenova/whisper-medium" data-color="#ff5f5f">medium (~750mb)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="action-buttons">
                <button id="record-btn" class="btn-secondary">
                    <i class="fas fa-microphone"></i> <span class="btn-text">record voice</span>
                </button>
                <button id="process-btn" class="btn-primary">
                    <i class="fas fa-download"></i> <span class="btn-text">load model</span>
                </button>
            </div>

            <!-- Status -->
            <div class="status-container">
                <div id="status-text" class="status-text">
                    <i class="fas fa-info-circle"></i> ready
                </div>
                <div id="progress-bar-bg" class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <!-- Sessions -->
            <div id="sessions-container" class="sessions-container">
                <!-- Session cards will be appended here -->
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
