<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper // AI Transcription</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <h1 class="main-title">whisper.ai</h1>
        <p class="description">private browser-based speech-to-text</p>

        <div class="glass-card">
            <!-- Drop Zone -->
            <div id="drop-zone" class="drop-zone">
                <i class="fas fa-cloud-upload-alt"></i>
                <p id="file-info">Drag & Drop audio file here or click to browse</p>
                <input type="file" id="audio-input" accept="audio/*" style="display: none;">
            </div>

            <!-- Controls -->
            <div class="controls-row">
                <div class="control-group">
                    <label>Language</label>
                    <select id="language-select">
                        <option value="russian">Russian</option>
                        <option value="english">English</option>
                        <option value="auto">Auto Detect</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Model Quality</label>
                    <select id="model-select">
                        <option value="Xenova/whisper-tiny">Tiny (Fast)</option>
                        <option value="Xenova/whisper-base" selected>Base (Better)</option>
                    </select>
                </div>
            </div>

            <button id="process-btn" class="btn-primary" disabled>
                <i class="fas fa-magic"></i> Start Transcription
            </button>

            <!-- Status -->
            <div class="status-container">
                <div id="status-text" class="status-text">
                    <i class="fas fa-info-circle"></i> Ready
                </div>
                <div id="progress-bar-bg" class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </div>

            <!-- Result -->
            <div id="result-container" class="result-container">
                <div class="result-header">
                    <h3>Transcription Result</h3>
                    <div class="action-links">
                        <span id="copy-btn" class="action-link"><i class="far fa-copy"></i> Copy</span>
                        <span id="download-btn" class="action-link"><i class="fas fa-download"></i> Save</span>
                    </div>
                </div>
                <div id="result-text" class="result-text"></div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
